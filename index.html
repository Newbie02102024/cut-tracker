<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0D0E11" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<title>Temper — Cut Phase Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230D0E11'/%3E%3Cpath d='M25 70 L45 30 L55 30 L75 70 M35 55 L65 55' stroke='%23FF6B35' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230D0E11'/%3E%3Cpath d='M25 70 L45 30 L55 30 L75 70 M35 55 L65 55' stroke='%23FF6B35' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0D0E11;
    --surface: rgba(30,32,38,0.66);
    --surface-solid: #1B1D22;
    --surface2: rgba(255,255,255,0.045);
    --surface3: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.09);
    --border-strong: rgba(255,255,255,0.16);
    --ember: #FF6B35;
    --ember-2: #FF8F5C;
    --ember-soft: rgba(255,107,53,0.16);
    --ember-glow: rgba(255,107,53,0.45);
    --temper: #22D3EE;
    --temper-2: #5EEAFB;
    --temper-soft: rgba(34,211,238,0.16);
    --temper-glow: rgba(34,211,238,0.4);
    --chalk: #F7F5F1;
    --slate: #9CA0AA;
    --slate-dim: #62656E;
    --verdigris: #34D399;
    --verdigris-soft: rgba(52,211,153,0.16);
    --gold: #FFC145;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    padding-bottom: 92px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-glow::before, .bg-glow::after {
    content: ''; position: absolute; border-radius: 50%; filter: blur(80px);
  }
  .bg-glow::before {
    width: 340px; height: 340px; top: -120px; left: -80px;
    background: radial-gradient(circle, var(--ember-glow), transparent 70%);
    opacity: 0.35;
  }
  .bg-glow::after {
    width: 300px; height: 300px; bottom: 60px; right: -100px;
    background: radial-gradient(circle, var(--temper-glow), transparent 70%);
    opacity: 0.28;
  }
  #app { position: relative; z-index: 1; }

  .disp { font-family: 'Bebas Neue', 'Inter', sans-serif; letter-spacing: 0.04em; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .grad-text {
    background: linear-gradient(90deg, var(--ember-2), var(--gold) 55%, var(--temper-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseGlow { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.9); } }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }

  /* ---- Header / Gauge ---- */
  .header { padding: 24px 18px 6px; position: relative; }
  .eyebrow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: linear-gradient(135deg, var(--ember), #E8492A);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 18px var(--ember-glow), inset 0 1px 1px rgba(255,255,255,0.35);
  }
  .brand-title { font-size: 1.55rem; line-height: 1; }
  .streak-chip {
    display: flex; align-items: center; gap: 6px; font-size: 0.72rem; padding: 6px 12px;
    border-radius: 20px; background: var(--surface); backdrop-filter: blur(14px);
    border: 1px solid var(--border-strong); color: var(--slate);
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  .streak-chip b { color: var(--chalk); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
  .flame-pulse { animation: pulseGlow 1.6s ease-in-out infinite; filter: drop-shadow(0 0 4px var(--ember-glow)); }

  .gauge-wrap { position: relative; display: flex; flex-direction: column; align-items: center; margin: 14px 0 0; animation: fadeSlide 0.5s ease; }
  .gauge-readout { position: absolute; top: 58%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .gauge-weight { font-size: 2.9rem; font-weight: 800; line-height: 1; letter-spacing: -0.01em; }
  .gauge-weight .unit { font-size: 1rem; color: var(--slate); font-weight: 500; margin-left: 3px; }
  .gauge-sub { font-size: 0.68rem; color: var(--slate); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 5px; font-weight: 600; }

  .readout-row { display: flex; gap: 8px; margin-top: 14px; }
  .readout-cell {
    flex: 1; text-align: center; padding: 12px 4px; border-radius: 14px;
    background: var(--surface); backdrop-filter: blur(14px); border: 1px solid var(--border);
  }
  .readout-val { font-family: 'JetBrains Mono', monospace; font-size: 1.15rem; font-weight: 700; }
  .readout-label { font-size: 0.6rem; color: var(--slate); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 3px; font-weight: 600; }

  /* ---- Tabs ---- */
  .content { padding: 18px 16px; animation: fadeSlide 0.35s ease; }
  .tabs {
    position: fixed; bottom: 14px; left: 14px; right: 14px; display: flex;
    background: rgba(24,25,30,0.85); backdrop-filter: blur(20px); border: 1px solid var(--border-strong);
    border-radius: 22px; padding: 6px; z-index: 20; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .tab-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 9px 0; background: none; border: none; color: var(--slate-dim); font-size: 0.62rem;
    text-transform: uppercase; letter-spacing: 0.05em; font-family: 'Inter', sans-serif; font-weight: 600;
    border-radius: 16px; transition: background 0.2s;
  }
  .tab-btn.active { color: var(--chalk); background: linear-gradient(135deg, rgba(255,107,53,0.22), rgba(34,211,238,0.14)); }
  .tab-btn.active svg { stroke: var(--ember-2) !important; }
  .tab-btn:active { transform: scale(0.94); }

  /* ---- Cards ---- */
  .card {
    background: var(--surface); backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: 18px; padding: 17px; margin-bottom: 13px;
    position: relative; box-shadow: 0 8px 28px rgba(0,0,0,0.28);
  }
  .card-title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 13px; }
  .card-title { display: flex; align-items: center; gap: 9px; font-size: 1.2rem; }
  .card-icon-badge {
    width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .card-tag { font-size: 0.73rem; color: var(--slate); margin-left: 39px; margin-top: 1px; }
  .pill { padding: 4px 11px; border-radius: 8px; font-size: 0.68rem; font-family: 'JetBrains Mono', monospace; border: 1px solid transparent; font-weight: 700; }

  .item-row {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 13px; border-radius: 12px; background: var(--surface2);
    border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer;
    text-align: left; color: var(--chalk); font-size: 0.91rem; transition: all 0.18s;
  }
  .item-row:active { transform: scale(0.985); }
  .item-row.done {
    background: linear-gradient(135deg, rgba(52,211,153,0.14), rgba(52,211,153,0.05));
    border-color: rgba(52,211,153,0.4);
  }
  .item-left { display: flex; align-items: center; gap: 11px; flex: 1; min-width: 0; }
  .checkbox {
    width: 21px; height: 21px; border-radius: 7px; border: 1.5px solid var(--slate-dim);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--surface3);
    transition: all 0.18s;
  }
  .item-row.done .checkbox { background: linear-gradient(135deg, var(--verdigris), #10B981); border-color: transparent; box-shadow: 0 0 10px rgba(52,211,153,0.5); }
  .item-row.done .item-name { text-decoration: line-through; color: var(--slate); }
  .item-sets { font-size: 0.73rem; color: var(--slate); flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .meal-desc { font-size: 0.75rem; color: var(--slate); margin-top: 3px; line-height: 1.4; }

  .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; }
  .nav-btn { background: var(--surface); backdrop-filter: blur(12px); border: 1px solid var(--border-strong); border-radius: 11px; padding: 8px 10px; color: var(--chalk); }
  .nav-btn:active { transform: scale(0.92); }
  .date-label { display: flex; align-items: center; gap: 7px; font-size: 0.9rem; font-family: 'JetBrains Mono', monospace; font-weight: 600; }

  .water-grid { display: flex; gap: 6px; }
  .water-cup { flex: 1; height: 34px; border-radius: 9px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .water-cup.filled { background: linear-gradient(180deg, var(--temper-2), var(--temper)); border-color: transparent; box-shadow: 0 0 12px var(--temper-glow); }

  .energy-row { display: flex; gap: 8px; margin-top: 5px; }
  .energy-dot {
    flex: 1; height: 38px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 0.78rem; color: var(--slate); cursor: pointer; font-weight: 700;
  }
  .energy-dot.active { background: linear-gradient(135deg, var(--ember), var(--gold)); border-color: transparent; color: #1A1000; box-shadow: 0 0 14px var(--ember-glow); }

  .exercise-tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .exercise-tag { font-size: 0.73rem; padding: 6px 10px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--slate); font-family: 'JetBrains Mono', monospace; }

  input[type=number], input[type=text] {
    flex: 1; padding: 11px 13px; border-radius: 10px; background: var(--surface2);
    border: 1px solid var(--border-strong); color: var(--chalk); font-size: 0.92rem; font-family: 'JetBrains Mono', monospace;
  }
  input::placeholder { color: var(--slate-dim); }
  .input-row { display: flex; gap: 8px; }
  .btn { padding: 11px 18px; border-radius: 10px; border: none; font-weight: 800; font-size: 0.83rem; text-transform: uppercase; letter-spacing: 0.03em; font-family: 'Inter', sans-serif; cursor: pointer; }
  .btn:active { transform: scale(0.96); }
  .btn-ember { background: linear-gradient(135deg, var(--ember), #E8492A); color: #1A1000; box-shadow: 0 4px 16px var(--ember-glow); }
  .btn-outline { background: var(--surface2); border: 1px solid var(--border-strong); color: var(--slate); }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 13px; }
  .stat-label { font-size: 0.68rem; color: var(--slate); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .stat-value { font-size: 1.3rem; margin-top: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 700; }

  .empty-note { text-align: center; color: var(--slate); font-size: 0.86rem; padding: 22px 10px; line-height: 1.5; }

  .heatmap-scroll { overflow-x: auto; padding-bottom: 4px; }
  .heatmap-legend { display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-top: 9px; font-size: 0.62rem; color: var(--slate); }
  .legend-sq { width: 10px; height: 10px; border-radius: 3px; }

  .measure-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 11px; }
  .measure-grid input { text-align: center; }
  .measure-field-label { font-size: 0.62rem; color: var(--slate); text-align: center; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .measure-history { display: flex; flex-direction: column; gap: 7px; margin-top: 11px; }
  .measure-row { display: flex; justify-content: space-between; font-size: 0.79rem; padding: 9px 11px; background: var(--surface2); border-radius: 10px; }
  .measure-row .d { color: var(--slate); font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }

  svg text { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div id="app"></div>

<script>
// ============ Program data ============
const SPLIT = {
  1: { name: "Upper Body — Push", tag: "Chest / Shoulders / Triceps", rest: false, exercises: [
    { id: "mon1", name: "DB Flat Bench Press", sets: "4×8-10" },
    { id: "mon2", name: "DB Shoulder Press", sets: "3×10-12" },
    { id: "mon3", name: "Incline DB Press", sets: "3×10-12" },
    { id: "mon4", name: "DB Lateral Raise", sets: "3×15" },
    { id: "mon5", name: "DB Overhead Triceps Ext.", sets: "3×12" },
    { id: "mon6", name: "DB Kickbacks", sets: "3×12" },
  ]},
  2: { name: "Lower Body A", tag: "Quads / Hamstrings / Calves", rest: false, exercises: [
    { id: "tue1", name: "DB Goblet Squat", sets: "4×10-12" },
    { id: "tue2", name: "DB Romanian Deadlift", sets: "3×10-12" },
    { id: "tue3", name: "DB Walking Lunges", sets: "3×12/leg" },
    { id: "tue4", name: "DB Calf Raise", sets: "4×15-20" },
    { id: "tue5", name: "Lying Leg Raises", sets: "3×15" },
    { id: "tue6", name: "Plank", sets: "3×45s" },
  ]},
  3: { name: "Active Recovery", tag: "Walk + Stretch", rest: true, exercises: [
    { id: "wed1", name: "Brisk Walk", sets: "25-30 min" },
    { id: "wed2", name: "Full Body Stretch / Mobility", sets: "10-15 min" },
  ]},
  4: { name: "Upper Body — Pull", tag: "Back / Biceps / Rear Delts", rest: false, exercises: [
    { id: "thu1", name: "DB Bent-Over Row", sets: "4×8-10" },
    { id: "thu2", name: "Single-Arm DB Row", sets: "3×10/side" },
    { id: "thu3", name: "DB Reverse Fly", sets: "3×15" },
    { id: "thu4", name: "DB Bicep Curl", sets: "3×12" },
    { id: "thu5", name: "DB Hammer Curl", sets: "3×12" },
    { id: "thu6", name: "DB Shrugs", sets: "3×15" },
  ]},
  5: { name: "Lower Body B", tag: "Glutes / Hamstrings / Core", rest: false, exercises: [
    { id: "fri1", name: "DB Bulgarian Split Squat", sets: "3×10/leg" },
    { id: "fri2", name: "DB Step-Ups", sets: "3×12/leg" },
    { id: "fri3", name: "DB Sumo Squat", sets: "3×12" },
    { id: "fri4", name: "DB Stiff-Leg Deadlift", sets: "3×12" },
    { id: "fri5", name: "DB Loaded Glute Bridge", sets: "3×15" },
    { id: "fri6", name: "Russian Twists", sets: "3×20" },
  ]},
  6: { name: "Full Body Conditioning", tag: "Fat-loss circuit", rest: false, exercises: [
    { id: "sat1", name: "DB Thrusters", sets: "4×12" },
    { id: "sat2", name: "Renegade Rows", sets: "3×10/side" },
    { id: "sat3", name: "DB Squat to Press", sets: "3×12" },
    { id: "sat4", name: "Burpees", sets: "3×15" },
    { id: "sat5", name: "Mountain Climbers", sets: "3×30s" },
    { id: "sat6", name: "Jump Squats", sets: "3×15" },
  ]},
  0: { name: "Rest Day", tag: "Recovery", rest: true, exercises: [
    { id: "sun1", name: "Light Stretch (optional)", sets: "10 min" },
  ]},
};

const MEALS = {
  A: { label: "Plan A", items: [
    { id: "breakfast", name: "Breakfast", desc: "2 banana, 2 tbsp peanut butter, 1 cup oats, 2 cups protein milk (shake)", kcal: 1000, p: 37 },
    { id: "lunch", name: "Lunch", desc: "200g grilled chicken breast, 1 cup rice, salad + olive oil", kcal: 650, p: 50 },
    { id: "snack", name: "Snack", desc: "200g Greek yogurt, handful almonds", kcal: 350, p: 28 },
    { id: "dinner", name: "Dinner", desc: "200g chicken thigh, sweet potato, sautéed veg", kcal: 600, p: 45 },
    { id: "evening", name: "Evening (optional)", desc: "2 boiled eggs or 100g cottage cheese", kcal: 150, p: 15 },
  ]},
  B: { label: "Plan B", items: [
    { id: "breakfast", name: "Breakfast", desc: "1 banana, 1 tbsp peanut butter, 1 cup oats, 2 cups protein milk (lighter shake)", kcal: 550, p: 25 },
    { id: "lunch", name: "Lunch", desc: "200g lean beef/turkey mince, quinoa, mixed veg", kcal: 650, p: 48 },
    { id: "snack", name: "Snack", desc: "200g Greek yogurt, 1 apple", kcal: 300, p: 22 },
    { id: "dinner", name: "Dinner", desc: "Grilled chicken thighs, brown rice, broccoli", kcal: 600, p: 45 },
    { id: "evening", name: "Evening (optional)", desc: "2 boiled eggs or cottage cheese", kcal: 150, p: 15 },
  ]},
};
const MACRO_TARGET = { kcal: 2485, protein: 180, fat: 70, carbs: 280 };
const DAY_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

// ============ Helpers ============
function dKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayKey(){ return dKey(new Date()); }
function fmtDate(key){ return new Date(key+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
function fmtShort(key){ return new Date(key+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function addDays(key,n){ const d=new Date(key+"T00:00:00"); d.setDate(d.getDate()+n); return dKey(d); }
function dayOfWeek(key){ return new Date(key+"T00:00:00").getDay(); }
function mealPlanFor(key){ return (new Date(key+"T00:00:00").getDate()%2===0) ? MEALS.A : MEALS.B; }

const DEFAULT_PROFILE = { height:183, age:21, startWeight:85, goalWeight:78, startDate: todayKey() };
function emptyDayLog(){ return { exercises:{}, meals:{}, water:0, weight:null, energy:null }; }

// ============ State ============
let state = { profile: DEFAULT_PROFILE, logs: {}, measurements: [] };
let tab = "today";
let viewDate = todayKey();

function load(){
  try {
    const raw = localStorage.getItem("cutTrackerData");
    if (raw) {
      const parsed = JSON.parse(raw);
      state.profile = parsed.profile || DEFAULT_PROFILE;
      state.logs = parsed.logs || {};
      state.measurements = parsed.measurements || [];
    }
  } catch(e) {}
}
function save(){
  try { localStorage.setItem("cutTrackerData", JSON.stringify(state)); } catch(e) { console.error(e); }
}
function getLog(key){ return state.logs[key] || emptyDayLog(); }

// ============ Mutations ============
function toggleExercise(key, exId){
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.exercises = Object.assign({}, day.exercises, { [exId]: !day.exercises[exId] });
  state.logs[key] = day; save(); render();
}
function toggleMeal(key, mealId){
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.meals = Object.assign({}, day.meals, { [mealId]: !day.meals[mealId] });
  state.logs[key] = day; save(); render();
}
function setWater(key, cups){
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.water = Math.max(0, cups);
  state.logs[key] = day; save(); render();
}
function setEnergy(key, val){
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.energy = day.energy === val ? null : val;
  state.logs[key] = day; save(); render();
}
function logWeight(key, val){
  const num = parseFloat(val);
  if (isNaN(num) || num<=0) return;
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.weight = num;
  state.logs[key] = day; save(); render();
}
function logMeasurement(){
  const waist = parseFloat(document.getElementById('mWaist').value);
  const chest = parseFloat(document.getElementById('mChest').value);
  const arm = parseFloat(document.getElementById('mArm').value);
  if (isNaN(waist) && isNaN(chest) && isNaN(arm)) return;
  state.measurements.push({ date: todayKey(), waist: waist||null, chest: chest||null, arm: arm||null });
  save(); render();
}

// ============ Derived ============
function weightSeries(){
  return Object.entries(state.logs)
    .filter(([,v]) => v.weight)
    .map(([k,v]) => ({ date:k, weight:v.weight }))
    .sort((a,b) => a.date > b.date ? 1 : -1);
}
function currentWeight(){
  const s = weightSeries();
  return s.length ? s[s.length-1].weight : state.profile.startWeight;
}
function weeklyAverage(){
  const s = weightSeries();
  if (!s.length) return null;
  const cutoff = addDays(todayKey(), -6);
  const recent = s.filter(e => e.date >= cutoff);
  if (!recent.length) return null;
  return recent.reduce((a,b) => a+b.weight, 0) / recent.length;
}
function computeStreak(){
  let count=0, cursor=todayKey();
  for (let i=0;i<90;i++){
    const dow = dayOfWeek(cursor);
    const plan = SPLIT[dow];
    const log = getLog(cursor);
    if (plan.rest) { cursor = addDays(cursor,-1); continue; }
    const allDone = plan.exercises.every(e => log.exercises[e.id]);
    if (allDone) { count++; cursor = addDays(cursor,-1); }
    else { if (cursor===todayKey()) { cursor = addDays(cursor,-1); continue; } break; }
  }
  return count;
}
function checkIcon(){ return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#052e1c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'; }

const ICON = {
  hammer: c => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 12l-8.5 8.5a1.5 1.5 0 0 1-2-2L13 10"/><path d="M17.6 3.5 20.5 6.4a1 1 0 0 1 0 1.4l-2.2 2.2a1 1 0 0 1-1.4 0L14 7a1 1 0 0 1 0-1.4l2.2-2.1a1 1 0 0 1 1.4 0z"/></svg>`,
  calendar: c => `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
  chevronLeft: c => `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.6"><polyline points="15 18 9 12 15 6"/></svg>`,
  chevronRight: c => `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.6"><polyline points="9 18 15 12 9 6"/></svg>`,
  utensils: c => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2"><path d="M3 2v7c0 1.1.9 2 2 2s2-.9 2-2V2M5 11v11M9 2v20M17 2c-2.2 0-4 3.6-4 8s1.8 8 4 8"/></svg>`,
  droplet: c => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2"><path d="M12 2s7 7.5 7 12a7 7 0 0 1-14 0c0-4.5 7-12 7-12z"/></svg>`,
  target: c => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
  gauge: c => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2"><path d="M12 20a8 8 0 1 0-8-8"/><path d="M12 12 16 8"/><circle cx="12" cy="12" r="1"/></svg>`,
  trend: c => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>`,
  ruler: c => `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2"><rect x="3" y="7" width="18" height="10" rx="1"/><path d="M7 7v3M11 7v3M15 7v3M19 7v3"/></svg>`,
  flame: c => `<svg width="13" height="13" viewBox="0 0 24 24" fill="${c}" stroke="none"><path d="M12 2c-2 4-5 5-5 10a5 5 0 0 0 10 0c0-1-.5-2-1-3 0 2-1 3-2 3-2 0-2-2-2-4 0-2 1-4 0-6z"/></svg>`,
};

// ============ Gauge ============
function polar(cx, cy, r, thetaDeg){
  const rad = thetaDeg * Math.PI / 180;
  return { x: cx + r*Math.cos(rad), y: cy - r*Math.sin(rad) };
}
function arcPath(cx, cy, r, thetaStart, thetaEnd){
  const p1 = polar(cx,cy,r,thetaStart);
  const p2 = polar(cx,cy,r,thetaEnd);
  const span = thetaStart - thetaEnd;
  const largeArc = span > 180 ? 1 : 0;
  return `M ${p1.x} ${p1.y} A ${r} ${r} 0 ${largeArc} 1 ${p2.x} ${p2.y}`;
}
function drawGauge(current, start, goal){
  const cx = 150, cy = 118, r = 106;
  const span = start - goal;
  const fraction = span > 0 ? Math.min(1, Math.max(0, (start-current)/span)) : 0;
  const thetaCurrent = 180 - fraction*180;
  const needle = polar(cx, cy, r, thetaCurrent);
  const track = arcPath(cx, cy, r, 180, 0);
  const fill = arcPath(cx, cy, r, 180, thetaCurrent);
  return `
  <svg viewBox="0 0 300 148" width="100%" style="max-width:360px;overflow:visible">
    <defs>
      <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#FF6B35"/>
        <stop offset="50%" stop-color="#FFC145"/>
        <stop offset="100%" stop-color="#22D3EE"/>
      </linearGradient>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <path d="${track}" stroke="rgba(255,255,255,0.08)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="${fill}" stroke="url(#gaugeGrad)" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="${needle.x}" cy="${needle.y}" r="8" fill="#F7F5F1" stroke="#0D0E11" stroke-width="3" filter="url(#glow)"/>
    <text x="18" y="140" fill="#62656E" font-size="10" font-weight="600">${start}kg</text>
    <text x="282" y="140" fill="#62656E" font-size="10" font-weight="600" text-anchor="end">${goal}kg</text>
  </svg>`;
}

// ============ Heatmap ============
function drawHeatmap(){
  const weeks = 12, cell = 11, gap = 3;
  const today = todayKey();
  let startCursor = addDays(today, -(weeks*7-1));
  while (dayOfWeek(startCursor) !== 0) startCursor = addDays(startCursor, -1);
  let cols = [];
  let cursor = startCursor;
  for (let w=0; w<weeks+2; w++){
    let col = [];
    for (let d=0; d<7; d++){
      col.push(cursor);
      cursor = addDays(cursor, 1);
      if (cursor > today) break;
    }
    cols.push(col);
    if (cursor > today) break;
  }
  const svgW = cols.length*(cell+gap);
  const svgH = 7*(cell+gap);
  let rects = '';
  cols.forEach((col, ci) => {
    col.forEach((dateKey, di) => {
      const dow = dayOfWeek(dateKey);
      const plan = SPLIT[dow];
      const log = getLog(dateKey);
      let color = 'rgba(255,255,255,0.05)';
      if (plan.rest) {
        color = 'rgba(255,255,255,0.09)';
      } else {
        const doneCount = plan.exercises.filter(e => log.exercises[e.id]).length;
        const frac = doneCount/plan.exercises.length;
        if (frac >= 1) color = '#FF6B35';
        else if (frac > 0.5) color = '#FFC145';
        else if (frac > 0) color = '#22D3EE';
      }
      const isToday = dateKey === today;
      rects += `<rect x="${ci*(cell+gap)}" y="${di*(cell+gap)}" width="${cell}" height="${cell}" rx="2.5" fill="${color}" ${isToday ? 'stroke="#F7F5F1" stroke-width="1"' : ''}><title>${dateKey}</title></rect>`;
    });
  });
  return `<div class="heatmap-scroll"><svg viewBox="0 0 ${svgW} ${svgH}" width="${Math.max(svgW,280)}" height="${svgH}">${rects}</svg></div>`;
}

function drawTrend(series, goal){
  const w = 320, h = 132, pad = 22;
  const weights = series.map(s=>s.weight);
  const min = Math.min(...weights, goal) - 1;
  const max = Math.max(...weights, goal) + 1;
  const x = i => pad + (i/(series.length-1)) * (w - pad*2);
  const y = v => h - pad - ((v-min)/(max-min)) * (h - pad*2);
  const points = series.map((s,i) => `${x(i)},${y(s.weight)}`).join(' ');
  const areaPoints = `${x(0)},${h-pad} ${points} ${x(series.length-1)},${h-pad}`;
  const goalY = y(goal);
  const dots = series.map((s,i) => `<circle cx="${x(i)}" cy="${y(s.weight)}" r="3.2" fill="#FF6B35" stroke="#0D0E11" stroke-width="1.5"/>`).join('');
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" style="overflow:visible">
    <defs>
      <linearGradient id="trendFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#FF6B35"/>
        <stop offset="100%" stop-color="#22D3EE"/>
      </linearGradient>
    </defs>
    <line x1="${pad}" y1="${goalY}" x2="${w-pad}" y2="${goalY}" stroke="#22D3EE" stroke-dasharray="4 3" stroke-width="1.5"/>
    <text x="${w-pad+2}" y="${goalY+3}" fill="#22D3EE" font-size="9" font-weight="700">GOAL</text>
    <polygon points="${areaPoints}" fill="url(#trendFill)"/>
    <polyline points="${points}" fill="none" stroke="url(#lineGrad)" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
  </svg>`;
}

// ============ Render ============

              <div class="meal-desc">${m.desc}</div>

      }).join('')}
      <div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:0.72rem;color:var(--slate)">

      <div class="stats-grid">

        <div class="stat-box"><div class="stat-label">Remaining</div><div class="stat-value">${Math.max(0,totalToLose-lostSoFar).toFixed(1)} kg</div></div>
        <div class="stat-box"><div class="stat-label">Target Date</div><div class="stat-value" style="font-size:1rem">${fmtShort(targetDate)}</div></div>

  </div>`;

  document.getElementById('app').innerHTML = html;
}

load();
render();
</script>
