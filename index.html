<html lang="en">

<meta name="apple-mobile-web-app-capable" content="yes" />

<title>Temper — Cut Phase Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230B0C0F'/%3E%3Cpath d='M25 70 L45 30 L55 30 L75 70 M35 55 L65 55' stroke='%23E8492A' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230B0C0F'/%3E%3Cpath d='M25 70 L45 30 L55 30 L75 70 M35 55 L65 55' stroke='%23E8492A' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0B0C0F;
    --surface: #15171C;
    --surface2: #1B1E24;
    --surface3: #23262D;
    --border: #262930;
    --ember: #E8492A;
    --ember-soft: rgba(232,73,42,0.14);
    --gold: #E5A93C;
    --gold-soft: rgba(229,169,60,0.14);
    --temper: #3B9CD9;
    --temper-soft: rgba(59,156,217,0.14);
    --chalk: #F4F3F1;
    --slate: #888C94;
    --slate-dim: #55585F;
    --verdigris: #34B37A;
    --verdigris-soft: rgba(52,179,122,0.14);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; min-width: 0; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; width: 100%; }
  body {
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    padding-bottom: 78px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .hdg { font-weight: 800; letter-spacing: 0.01em; }

  /* ---- Header ---- */
  .header { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
  .eyebrow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-mark { width: 24px; height: 24px; border-radius: 6px; background: var(--ember-soft); border: 1px solid var(--ember); display: flex; align-items: center; justify-content: center; }
  .brand-title { font-size: 1.05rem; font-weight: 800; letter-spacing: 0.02em; }
  .streak-chip { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; padding: 5px 10px; border-radius: 7px; background: var(--ember-soft); border: 1px solid var(--ember); color: var(--chalk); font-weight: 700; }

  .mass-row { display: flex; justify-content: space-between; align-items: flex-end; }
  .mass-label { font-size: 0.65rem; color: var(--slate); text-transform: uppercase; letter-spacing: 0.09em; font-weight: 700; margin-bottom: 5px; }
  .mass-value { font-size: 2.2rem; font-weight: 800; line-height: 1; }
  .mass-value .unit { font-size: 0.9rem; color: var(--slate); font-weight: 500; margin-left: 3px; }

  .progress-linear { position: relative; width: 100%; height: 8px; border-radius: 20px; margin-top: 14px; background: var(--surface3); overflow: hidden; }
  .progress-fill-linear { height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--ember), var(--gold)); }
  .progress-summary { display: flex; justify-content: space-between; margin-top: 9px; font-size: 0.74rem; color: var(--slate); font-weight: 600; }
  .progress-summary b { color: var(--chalk); font-family: 'JetBrains Mono', monospace; }

  /* ---- Layout ---- */
  .content { padding: 16px; max-width: 100%; }
  .tabs { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: var(--surface); border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); z-index: 20; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 0 9px; background: none; border: none; border-top: 2px solid transparent; color: var(--slate-dim); font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.04em; font-family: 'Inter', sans-serif; font-weight: 700; }
  .tab-btn.active { color: var(--ember); border-top-color: var(--ember); }
  .tab-btn.active svg { stroke: var(--ember) !important; }

  /* ---- Cards ---- */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; max-width: 100%; overflow: hidden; }
  .card-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-title { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 800; letter-spacing: 0.01em; text-transform: uppercase; }
  .card-tag { font-size: 0.73rem; color: var(--slate); margin-top: 2px; }
  .pill { padding: 3px 9px; border-radius: 6px; font-size: 0.66rem; font-family: 'JetBrains Mono', monospace; border: 1px solid transparent; font-weight: 700; }

  /* checklist rows: divided list, not filled boxes */
  .item-row { width: 100%; display: flex; align-items: center; gap: 11px; padding: 11px 2px; border-bottom: 1px solid var(--border); cursor: pointer; text-align: left; background: none; border-left: none; border-right: none; border-top: none; }
  .item-row:last-child { border-bottom: none; }
  .checkbox { width: 19px; height: 19px; border-radius: 5px; border: 1.5px solid var(--slate-dim); display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: transparent; margin-top: 1px; }
  .item-row.done .checkbox { background: var(--verdigris); border-color: var(--verdigris); }
  .item-row.done .item-name { color: var(--slate); text-decoration: line-through; }
  .item-body { flex: 1; min-width: 0; }
  .item-name { color: var(--chalk); font-size: 0.9rem; font-weight: 600; display: block; }
  .item-sub { font-size: 0.72rem; color: var(--slate); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .item-badges { display: flex; gap: 5px; flex-shrink: 0; }
  .badge { padding: 3px 7px; border-radius: 5px; background: var(--surface3); border: 1px solid var(--border); font-size: 0.64rem; color: var(--slate); font-family: 'JetBrains Mono', monospace; font-weight: 700; white-space: nowrap; }
  .meal-desc { font-size: 0.75rem; color: var(--slate); margin-top: 3px; line-height: 1.4; }

  .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .nav-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 9px; color: var(--chalk); }
  .date-label { display: flex; align-items: center; gap: 6px; font-size: 0.86rem; font-family: 'JetBrains Mono', monospace; font-weight: 600; }

  .water-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
  .water-cup { height: 30px; border-radius: 6px; background: var(--surface3); border: 1px solid var(--border); cursor: pointer; min-width: 0; }
  .water-cup.filled { background: var(--temper); border-color: var(--temper); }

  .energy-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-top: 4px; }
  .energy-dot { height: 34px; border-radius: 8px; background: var(--surface3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: var(--slate); cursor: pointer; font-weight: 700; min-width: 0; }
  .energy-dot.active { background: var(--ember); border-color: var(--ember); color: #1A0800; }

  /* weekly protocol day card */
  .day-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .day-card.today { border-color: var(--ember); }
  .day-header { padding: 12px 15px; background: var(--surface2); display: flex; justify-content: space-between; align-items: center; }
  .day-header .dow { font-size: 0.66rem; color: var(--slate); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
  .day-header .dname { font-size: 0.98rem; font-weight: 800; margin-top: 2px; }
  .day-body { padding: 12px 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ex-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 9px 10px; min-width: 0; }
  .ex-box .exn { font-size: 0.79rem; font-weight: 700; color: var(--chalk); overflow-wrap: break-word; }
  .ex-box .exs { font-size: 0.7rem; color: var(--slate); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

  input[type=number], input[type=text] {
    width: 100%; min-width: 0; padding: 10px 12px; border-radius: 9px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--chalk); font-size: 0.88rem; font-family: 'JetBrains Mono', monospace;
  }
  input::placeholder { color: var(--slate-dim); }
  .input-row { display: flex; gap: 8px; min-width: 0; }
  .input-row input { flex: 1; min-width: 0; }
  .btn { padding: 10px 16px; border-radius: 9px; border: none; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.02em; font-family: 'Inter', sans-serif; cursor: pointer; flex-shrink: 0; }
  .btn-ember { background: var(--gold); color: #1A1000; }
  .btn-outline { background: var(--surface2); border: 1px solid var(--border); color: var(--slate); width: 100%; }
  .btn-icon { width: 42px; height: 42px; padding: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; min-width: 0; }
  .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; padding: 12px 13px; min-width: 0; }
  .stat-label { font-size: 0.66rem; color: var(--slate); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; display: flex; align-items: center; gap: 5px; }
  .stat-value { font-size: 1.35rem; margin-top: 5px; font-family: 'JetBrains Mono', monospace; font-weight: 700; }

  .target-date-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .target-date-val { font-size: 1.15rem; font-weight: 700; }
  .days-left-pill { padding: 5px 10px; border-radius: 7px; background: var(--ember-soft); border: 1px solid var(--ember); color: var(--ember); font-size: 0.7rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }

  .empty-note { text-align: center; color: var(--slate); font-size: 0.85rem; padding: 20px 8px; line-height: 1.5; }

  .heatmap-scroll { overflow-x: auto; padding-bottom: 4px; max-width: 100%; }
  .heatmap-legend { display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-top: 8px; font-size: 0.6rem; color: var(--slate); }
  .legend-sq { width: 9px; height: 9px; border-radius: 2px; }

  .measure-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-bottom: 10px; }
  .measure-grid > div { min-width: 0; }
  .measure-grid input { text-align: center; width: 100%; }
  .measure-field-label { font-size: 0.6rem; color: var(--slate); text-align: center; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.03em; font-weight: 700; }
  .measure-history { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .measure-row { display: flex; justify-content: space-between; font-size: 0.77rem; padding: 8px 10px; background: var(--surface2); border-radius: 8px; gap: 8px; }
  .measure-row .d { color: var(--slate); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; flex-shrink: 0; }
  .measure-row span:last-child { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; text-align: right; }

  .legend-row { display: flex; gap: 12px; font-size: 0.68rem; color: var(--slate); }
  .legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; }

  svg text { font-family: 'JetBrains Mono', monospace; }
</style>
</head>

<script>
// ============ Program data ============
const SPLIT = {

  5: { name: "Lower B", tag: "Glutes / Hamstrings / Core", rest: false, exercises: [

    { id: "fri2", name: "DB Step-Ups", sets: "3x12/leg" },
    { id: "fri3", name: "DB Sumo Squat", sets: "3x12" },
    { id: "fri4", name: "DB Stiff-Leg Deadlift", sets: "3x12" },
    { id: "fri5", name: "DB Loaded Glute Bridge", sets: "3x15" },
    { id: "fri6", name: "Russian Twists", sets: "3x20" },
  ]},
  6: { name: "Full Body Conditioning", tag: "Fat-loss circuit", rest: false, exercises: [
    { id: "sat1", name: "DB Thrusters", sets: "4x12" },
    { id: "sat2", name: "Renegade Rows", sets: "3x10/side" },
    { id: "sat3", name: "DB Squat to Press", sets: "3x12" },
    { id: "sat4", name: "Burpees", sets: "3x15" },
    { id: "sat5", name: "Mountain Climbers", sets: "3x30s" },
    { id: "sat6", name: "Jump Squats", sets: "3x15" },
  ]},
  0: { name: "Upper Pull B", tag: "Back / Biceps / Rear Delts — recovery day dropped, keep an eye on soreness", rest: false, exercises: [
    { id: "sun1", name: "DB Bent-Over Row", sets: "3x8-10" },
    { id: "sun2", name: "Single-Arm DB Row", sets: "3x10/side" },
    { id: "sun3", name: "DB Reverse Fly", sets: "3x15" },
    { id: "sun4", name: "DB Bicep Curl", sets: "3x12" },
    { id: "sun5", name: "DB Hammer Curl", sets: "3x12" },
  ]},
};

const MEALS = {
  A: { label: "Plan A", items: [
    { id: "breakfast", name: "Breakfast", desc: "2 banana, 2 tbsp peanut butter, 1 cup oats, 2 cups protein milk (shake)", kcal: 1000, p: 37 },
    { id: "lunch", name: "Lunch", desc: "200g grilled chicken breast, 1 cup rice, salad + olive oil", kcal: 650, p: 50 },
    { id: "snack", name: "Snack", desc: "200g Greek yogurt, handful almonds", kcal: 350, p: 28 },
    { id: "dinner", name: "Dinner", desc: "200g chicken thigh, sweet potato, sautéed veg", kcal: 600, p: 45 },
    { id: "evening", name: "Evening (optional)", desc: "2 boiled eggs or 100g cottage cheese", kcal: 150, p: 15 },
  ]},
  B: { label: "Plan B", items: [
    { id: "breakfast", name: "Breakfast", desc: "1 banana, 1 tbsp peanut butter, 1 cup oats, 2 cups protein milk (lighter shake)", kcal: 550, p: 25 },
    { id: "lunch", name: "Lunch", desc: "200g lean beef/turkey mince, quinoa, mixed veg", kcal: 650, p: 48 },
    { id: "snack", name: "Snack", desc: "200g Greek yogurt, 1 apple", kcal: 300, p: 22 },
    { id: "dinner", name: "Dinner", desc: "Grilled chicken thighs, brown rice, broccoli", kcal: 600, p: 45 },
    { id: "evening", name: "Evening (optional)", desc: "2 boiled eggs or cottage cheese", kcal: 150, p: 15 },
  ]},
};
const MACRO_TARGET = { kcal: 2485, protein: 180, fat: 70, carbs: 280 };
const DAY_NAMES = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

// ============ Helpers ============
function dKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayKey(){ return dKey(new Date()); }
function fmtDate(key){ return new Date(key+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
function fmtLong(key){ return new Date(key+"T00:00:00").toLocaleDateString(undefined,{month:"long",day:"numeric",year:"numeric"}); }
function fmtShort(key){ return new Date(key+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function addDays(key,n){ const d=new Date(key+"T00:00:00"); d.setDate(d.getDate()+n); return dKey(d); }
function dayOfWeek(key){ return new Date(key+"T00:00:00").getDay(); }
function mealPlanFor(key){ return (new Date(key+"T00:00:00").getDate()%2===0) ? MEALS.A : MEALS.B; }

const DEFAULT_PROFILE = { height:183, age:21, startWeight:85, goalWeight:78, startDate: todayKey() };
function emptyDayLog(){ return { exercises:{}, meals:{}, water:0, weight:null, energy:null }; }

// ============ State ============
let state = { profile: DEFAULT_PROFILE, logs: {}, measurements: [] };
let tab = "today";
let viewDate = todayKey();

function load(){
  try {
    const raw = localStorage.getItem("cutTrackerData");
    if (raw) {
      const parsed = JSON.parse(raw);
      state.profile = parsed.profile || DEFAULT_PROFILE;
      state.logs = parsed.logs || {};
      state.measurements = parsed.measurements || [];
    }
  } catch(e) {}
}
function save(){
  try { localStorage.setItem("cutTrackerData", JSON.stringify(state)); } catch(e) { console.error(e); }
}
function getLog(key){ return state.logs[key] || emptyDayLog(); }

// ============ Mutations ============
function toggleExercise(key, exId){
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.exercises = Object.assign({}, day.exercises, { [exId]: !day.exercises[exId] });
  state.logs[key] = day; save(); render();
}
function toggleMeal(key, mealId){
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.meals = Object.assign({}, day.meals, { [mealId]: !day.meals[mealId] });
  state.logs[key] = day; save(); render();
}
function setWater(key, cups){
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.water = Math.max(0, cups);
  state.logs[key] = day; save(); render();
}
function setEnergy(key, val){
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.energy = day.energy === val ? null : val;
  state.logs[key] = day; save(); render();
}
function logWeight(key, val){
  const num = parseFloat(val);
  if (isNaN(num) || num<=0) {
    const input = document.getElementById('weightInput');
    if (input) {
      input.style.borderColor = '#E8492A';
      input.placeholder = 'Type a number first';
      setTimeout(() => { input.style.borderColor = ''; }, 1500);
    }
    return;
  }
  const day = Object.assign(emptyDayLog(), state.logs[key]);
  day.weight = num;
  state.logs[key] = day; save(); render();
}
function logMeasurement(){
  const waist = parseFloat(document.getElementById('mWaist').value);
  const chest = parseFloat(document.getElementById('mChest').value);
  const arm = parseFloat(document.getElementById('mArm').value);
  if (isNaN(waist) && isNaN(chest) && isNaN(arm)) return;
  state.measurements.push({ date: todayKey(), waist: waist||null, chest: chest||null, arm: arm||null });
  save(); render();
}
function exportBackup(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `temper-backup-${todayKey()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importBackup(event){
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.profile || !parsed.logs) throw new Error('Invalid backup file');
      state = { profile: parsed.profile, logs: parsed.logs, measurements: parsed.measurements || [] };
      save();
      render();
      alert('Backup restored.');
    } catch(err) {
      alert('Could not read that file — is it a Temper backup JSON?');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============ Derived ============
function weightSeries(){
  return Object.entries(state.logs)
    .filter(([,v]) => v.weight)
    .map(([k,v]) => ({ date:k, weight:v.weight }))
    .sort((a,b) => a.date > b.date ? 1 : -1);
}
function currentWeight(){
  const s = weightSeries();
  return s.length ? s[s.length-1].weight : state.profile.startWeight;
}
function weeklyAverage(){
  const s = weightSeries();
  if (!s.length) return null;
  const cutoff = addDays(todayKey(), -6);
  const recent = s.filter(e => e.date >= cutoff);
  if (!recent.length) return null;
  return recent.reduce((a,b) => a+b.weight, 0) / recent.length;
}
function computeStreak(){
  let count=0, cursor=todayKey();
  for (let i=0;i<90;i++){
    const dow = dayOfWeek(cursor);
    const plan = SPLIT[dow];
    const log = getLog(cursor);
    if (plan.rest) { cursor = addDays(cursor,-1); continue; }
    const allDone = plan.exercises.every(e => log.exercises[e.id]);
    if (allDone) { count++; cursor = addDays(cursor,-1); }
    else { if (cursor===todayKey()) { cursor = addDays(cursor,-1); continue; } break; }
  }
  return count;
}
function checkIcon(){ return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#052e1c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'; }

  save: c => `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`,

function drawHeatmap(){
  const weeks = 12, cell = 11, gap = 3;
  const today = todayKey();
  let startCursor = addDays(today, -(weeks*7-1));
  while (dayOfWeek(startCursor) !== 0) startCursor = addDays(startCursor, -1);
  let cols = [];
  let cursor = startCursor;
  for (let w=0; w<weeks+2; w++){
    let col = [];
    for (let d=0; d<7; d++){
      col.push(cursor);
      cursor = addDays(cursor, 1);
      if (cursor > today) break;
    }
    cols.push(col);
    if (cursor > today) break;
  }
  const svgW = cols.length*(cell+gap);
  const svgH = 7*(cell+gap);
  let rects = '';
  cols.forEach((col, ci) => {
    col.forEach((dateKey, di) => {
      const dow = dayOfWeek(dateKey);
      const plan = SPLIT[dow];
      const log = getLog(dateKey);
      let color = '#1B1E24';
      if (plan.rest) {
        color = '#23262D';
      } else {
        const doneCount = plan.exercises.filter(e => log.exercises[e.id]).length;
        const frac = doneCount/plan.exercises.length;
        if (frac >= 1) color = '#E8492A';
        else if (frac > 0.5) color = '#E5A93C';
        else if (frac > 0) color = '#3B9CD9';
      }
      const isToday = dateKey === today;
      rects += `<rect x="${ci*(cell+gap)}" y="${di*(cell+gap)}" width="${cell}" height="${cell}" rx="2.5" fill="${color}" ${isToday ? 'stroke="#F4F3F1" stroke-width="1"' : ''}><title>${dateKey}</title></rect>`;
    });
  });
  return `<div class="heatmap-scroll"><svg viewBox="0 0 ${svgW} ${svgH}" width="${Math.max(svgW,260)}" height="${svgH}">${rects}</svg></div>`;
}

function drawTrend(series, goal){
  const w = 300, h = 130, pad = 28;
  const weights = series.map(s=>s.weight);
  const min = Math.min(...weights, goal) - 1;
  const max = Math.max(...weights, goal) + 1;
  const x = i => pad + (i/(series.length-1)) * (w - pad*2);
  const y = v => h - pad - ((v-min)/(max-min)) * (h - pad*2);
  const points = series.map((s,i) => `${x(i)},${y(s.weight)}`).join(' ');
  const goalY = y(goal);
  const dots = series.map((s,i) => `<circle cx="${x(i)}" cy="${y(s.weight)}" r="3" fill="#E5A93C" stroke="#15171C" stroke-width="1.5"/>`).join('');
  const axisSteps = 3;
  let axisLines = '';
  for (let i=0; i<=axisSteps; i++){
    const val = min + (max-min)*(i/axisSteps);
    const yy = y(val);
    axisLines += `<line x1="${pad}" y1="${yy}" x2="${w-pad}" y2="${yy}" stroke="#23262D" stroke-width="1"/>`;
    axisLines += `<text x="0" y="${yy+3}" fill="#55585F" font-size="8">${val.toFixed(0)}</text>`;
  }
  return `<div class="legend-row" style="margin-bottom:8px">
    <span><span class="legend-dot" style="background:#E5A93C"></span>Logged</span>
    <span><span class="legend-dot" style="background:#E8492A"></span>Goal</span>
  </div>
  <svg width="100%" viewBox="0 0 ${w} ${h}" style="overflow:visible;max-width:100%">
    ${axisLines}
    <line x1="${pad}" y1="${goalY}" x2="${w-pad}" y2="${goalY}" stroke="#E8492A" stroke-dasharray="4 3" stroke-width="1.5"/>
    <polyline points="${points}" fill="none" stroke="#E5A93C" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
  </svg>`;
}

// ============ Render ============

  const streak = computeStreak();

          </div>
        </button>`;
      }).join('')}
      ${!plan.rest ? `

        <div class="card-tag" style="margin-bottom:7px">SESSION FELT</div>

  if (tab === "progress") {

    html += `

    <div class="stats-grid" style="margin-bottom:12px">

    <div class="card">

      <div class="target-date-row">

  }

  html += `</div>
  <div class="tabs">
    <button class="tab-btn ${tab==='today'?'active':''}" onclick="tab='today';render()">${ICON.dumbbell(tab==='today'?'#E8492A':'#55585F')}<span>Today</span></button>

  </div>`;

  document.getElementById('app').innerHTML = html;
}

load();
render();
